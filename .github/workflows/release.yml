name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: epanel
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: epanel
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: epanel
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: epanel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (x86_64 Linux / macOS)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        env:
          EPANEL_VERSION: ${{ github.ref_name }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          EPANEL_VERSION: ${{ github.ref_name }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/epanel
          tar -czf dist/${{ matrix.binary_name }}-${{ matrix.target }}.tar.gz -C dist epanel
          rm dist/epanel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epanel-${{ matrix.target }}
          path: dist/${{ matrix.binary_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
